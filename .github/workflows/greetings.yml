name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "初めてのイシュー　君とイシュー　I will give you all my love"
        pr-message: "これが人生で初めてのプルリクだ貴重かつ重要だ"
